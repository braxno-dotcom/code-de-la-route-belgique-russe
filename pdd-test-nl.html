const categories = {
  speed: { name: "Snelheid en regels", color: "#e74c3c", comments: ["SNELHEID EN REGELS", "SNELHEID"] },
  priority: { name: "Voorrang", color: "#f39c12", comments: ["VOORRANG"] },

  visibility: { name: "Weg en zicht", color: "#1abc9c", comments: ["WEG EN ZICHT", "ZICHT"] },
  eco: { name: "Eco-rijden", color: "#27ae60", comments: ["ECO-RIJDEN", "ECO"] },
  firstaid: { name: "Eerste hulp", color: "#e67e22", comments: ["EERSTE HULP"] },
  admin: { name: "Administratief", color: "#34495e", comments: ["ADMINISTRATIEF", "ADMIN"] }
};

// Tag each question with a category
function tagQuestions() {
  let currentCat = "admin";
  const scripts = document.querySelectorAll("script");
  const src = scripts[scripts.length - 1].textContent;
  const lines = src.split("\n");
  let qIndex = 0;
  for (const line of lines) {
    const commentMatch = line.match(/\/\/\s*---?\s*(.*?)\s*---?\s*$/) || line.match(/\/\/\s*(.*(?:SNELHEID|VOORRANG|TECHNIEK|BESTUURDER|WEG|ECO|EERSTE|ADMIN).*)/i);
    if (commentMatch) {
      const text = commentMatch[1].toUpperCase();
      for (const [key, cat] of Object.entries(categories)) {
        if (cat.comments.some(c => text.includes(c))) { currentCat = key; break; }
      }
    }
    if (line.includes("{q:") && qIndex < questions.length) {
      questions[qIndex]._cat = currentCat;
      qIndex++;
    }
  }
  for (const q of questions) { if (!q._cat) q._cat = "admin"; }
}
tagQuestions();

// --- Sound effects (Web Audio API) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playCorrectSound() {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  [523.25, 783.99].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, now + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.5);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + i * 0.15);
    osc.stop(now + i * 0.15 + 0.5);
  });
}

function playWrongSound() {
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const bp = ctx.createBiquadFilter();
  bp.type = "bandpass";
  bp.frequency.value = 3000;
  bp.Q.value = 5;
  bp.frequency.setValueAtTime(4000, now);
  bp.frequency.exponentialRampToValueAtTime(1500, now + 0.5);
  const screechGain = ctx.createGain();
  screechGain.gain.setValueAtTime(0.4, now);
  screechGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
  noise.connect(bp);
  bp.connect(screechGain);
  screechGain.connect(ctx.destination);
  noise.start(now);
  noise.stop(now + 0.6);
  const impactBuf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
  const impactData = impactBuf.getChannelData(0);
  for (let i = 0; i < impactData.length; i++) impactData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.05));
  const impact = ctx.createBufferSource();
  impact.buffer = impactBuf;
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.value = 800;
  const impactGain = ctx.createGain();
  impactGain.gain.setValueAtTime(0.6, now + 0.35);
  impactGain.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
  impact.connect(lp);
  lp.connect(impactGain);
  impactGain.connect(ctx.destination);
  impact.start(now + 0.35);
  impact.stop(now + 0.65);
}

// --- State ---
let currentQ = 0;
let score = 0;
let wrongCount = 0;
let answered = false;
let examQuestions = [];
let wrongQuestions = [];
let timerInterval = null;
let timeLeft = 15 * 60;

// --- LocalStorage mistakes ---
function getMistakes() {
  try { return JSON.parse(localStorage.getItem("pdd_be_nl_mistakes") || "[]"); } catch { return []; }
}
function saveMistake(q) {
  const m = getMistakes();
  if (!m.find(x => x.q === q.q)) { m.push({ q: q.q, q_ru: q.q_ru, o: q.o, a: q.a, _cat: q._cat }); }
  localStorage.setItem("pdd_be_nl_mistakes", JSON.stringify(m));
}
function removeMistake(q) {
  const m = getMistakes().filter(x => x.q !== q.q);
  localStorage.setItem("pdd_be_nl_mistakes", JSON.stringify(m));
}
function updateMistakesUI() {
  const m = getMistakes();
  const info = document.getElementById("mistakes-info");
  const count = document.getElementById("mistakes-count");
  if (m.length > 0) { info.style.display = "block"; count.textContent = m.length; }
  else { info.style.display = "none"; }
}

// --- Timer ---
function startTimer() {
  if (!document.getElementById("timer-toggle").checked) {
    document.getElementById("timer-display").textContent = "";
    return;
  }
  timeLeft = 15 * 60;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); endExam(); }
  }, 1000);
}
function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const el = document.getElementById("timer-display");
  el.textContent = `${m}:${s.toString().padStart(2, "0")}`;
  el.classList.toggle("warning", timeLeft <= 60);
}
function stopTimer() { clearInterval(timerInterval); }

// --- Exam setup ---
function setupExam(qs) {
  examQuestions = [...qs].sort(() => Math.random() - 0.5).slice(0, 50);
  currentQ = 0; score = 0; wrongCount = 0; wrongQuestions = [];
  document.getElementById("q-total").textContent = examQuestions.length;
  document.getElementById("score").textContent = "0";
  document.getElementById("wrong-count").textContent = "0";
  updateProgress();
}

function getFilteredQuestions() {
  const cat = document.getElementById("category-select").value;
  if (cat === "all") return questions;
  return questions.filter(q => q._cat === cat);
}

// --- UI ---
function showScreen(id) {
  ["start-screen", "quiz-screen", "results-screen"].forEach(s => {
    document.getElementById(s).style.display = s === id ? "block" : "none";
  });
}

function updateProgress() {
  const pct = examQuestions.length > 0 ? ((currentQ) / examQuestions.length) * 100 : 0;
  document.getElementById("progress-bar").style.width = pct + "%";
}

function showQuestion() {
  answered = false;
  const item = examQuestions[currentQ];
  document.getElementById("q-num").textContent = currentQ + 1;
  document.getElementById("question").textContent = item.q;
  document.getElementById("hint-text").style.display = "none";
  document.getElementById("hint-text").textContent = "";
  document.getElementById("options").innerHTML = "";
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("prev-btn").style.display = currentQ > 0 ? "block" : "none";
  updateProgress();

  const badge = document.getElementById("category-badge");
  const cat = categories[item._cat];
  if (cat) {
    badge.textContent = cat.name;
    badge.style.background = cat.color;
    badge.style.display = "inline-block";
  } else {
    badge.style.display = "none";
  }

  const indices = item.o.map((_, i) => i);
  indices.sort(() => Math.random() - 0.5);

  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement("button");
    btn.textContent = item.o[origIdx];
    btn.classList.add("btn");
    btn.style.animationDelay = (displayIdx * 0.05) + "s";
    btn.onclick = () => checkAnswer(origIdx, btn);
    document.getElementById("options").appendChild(btn);
  });
}

function checkAnswer(idx, clickedBtn) {
  if (answered) return;
  answered = true;
  const item = examQuestions[currentQ];
  const buttons = document.getElementById("options").querySelectorAll(".btn");

  buttons.forEach(b => b.classList.add("disabled"));

  if (idx === item.a) {
    score++;
    clickedBtn.classList.add("correct");
    removeMistake(item);
    playCorrectSound();
  } else {
    wrongCount++;
    clickedBtn.classList.add("wrong");
    wrongQuestions.push(item);
    saveMistake(item);
    playWrongSound();
    buttons.forEach(b => {
      if (b.textContent === item.o[item.a]) b.classList.add("correct");
    });
  }
  document.getElementById("score").textContent = score;
  document.getElementById("wrong-count").textContent = wrongCount;
  document.getElementById("next-btn").style.display = "block";
}

function endExam() {
  stopTimer();
  showScreen("results-screen");

  const total = examQuestions.length;
  const passThreshold = Math.ceil(total * 0.82); // 41/50
  const passed = score >= passThreshold;
  document.getElementById("results-title").textContent = passed ? "Экзамен сдан!" : "Не сдан";
  document.getElementById("results-score").textContent = score;
  document.getElementById("results-total").textContent = total;

  const circle = document.getElementById("results-circle");
  circle.className = passed ? "result-pass" : "result-fail";

  const pct = Math.round((score / total) * 100);
  document.getElementById("results-stats").innerHTML =
    `<div>Правильных: <b>${score}</b> (${pct}%)</div>` +
    `<div>Ошибок: <b>${wrongCount}</b></div>` +
    `<div>Порог сдачи: <b>${passThreshold}/${total}</b> (Бельгия: 41/50)</div>`;

  const retryBtn = document.getElementById("retry-wrong-btn");
  if (wrongQuestions.length > 0) {
    retryBtn.style.display = "inline-block";
    retryBtn.textContent = `Повторить ошибки (${wrongQuestions.length})`;
  } else {
    retryBtn.style.display = "none";
  }
}

// --- Events ---
document.getElementById("hint-btn").onclick = () => {
  const hint = document.getElementById("hint-text");
  hint.textContent = examQuestions[currentQ].q_ru;
  hint.style.display = "block";
};

document.getElementById("next-btn").onclick = () => {
  currentQ++;
  if (currentQ < examQuestions.length) {
    showQuestion();
  } else {
    endExam();
  }
};

document.getElementById("prev-btn").onclick = () => {
  if (currentQ > 0) {
    currentQ--;
    showQuestion();
  }
};

document.getElementById("start-btn").onclick = () => {
  const filtered = getFilteredQuestions();
  if (filtered.length === 0) { alert("Geen vragen in deze categorie"); return; }
  setupExam(filtered);
  showScreen("quiz-screen");
  startTimer();
  showQuestion();
};

document.getElementById("restart-btn").onclick = () => {
  updateMistakesUI();
  showScreen("start-screen");
};

document.getElementById("retry-wrong-btn").onclick = () => {
  if (wrongQuestions.length === 0) return;
  examQuestions = [...wrongQuestions].sort(() => Math.random() - 0.5);
  currentQ = 0; score = 0; wrongCount = 0; wrongQuestions = [];
  document.getElementById("q-total").textContent = examQuestions.length;
  document.getElementById("score").textContent = "0";
  document.getElementById("wrong-count").textContent = "0";
  showScreen("quiz-screen");
  startTimer();
  showQuestion();
};

document.getElementById("retry-mistakes-btn").onclick = () => {
  const m = getMistakes();
  if (m.length === 0) return;
  examQuestions = [...m].sort(() => Math.random() - 0.5);
  currentQ = 0; score = 0; wrongCount = 0; wrongQuestions = [];
  document.getElementById("q-total").textContent = examQuestions.length;
  document.getElementById("score").textContent = "0";
  document.getElementById("wrong-count").textContent = "0";
  showScreen("quiz-screen");
  startTimer();
  showQuestion();
};

document.getElementById("theme-toggle").onclick = () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  document.getElementById("theme-toggle").innerHTML = isDark ? "&#9788;" : "&#9790;";
  localStorage.setItem("pdd_be_nl_theme", isDark ? "dark" : "light");
};

if (localStorage.getItem("pdd_be_nl_theme") === "dark") {
  document.body.classList.add("dark");
  document.getElementById("theme-toggle").innerHTML = "&#9788;";
}

updateMistakesUI();

(function() {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");
  if (cat) {
    const sel = document.getElementById("category-select");
    const opts = Array.from(sel.options).map(o => o.value);
    if (opts.includes(cat)) {
      sel.value = cat;
    }
  }
})();

showScreen("start-screen");
</script>
</body>
</html>
